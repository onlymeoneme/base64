name: Update V2Ray Subscriptions

on:
  schedule:
    # Запуск каждые 30 минут
    - cron: '*/30 * * * *'
  # Оставляем возможность ручного запуска
  workflow_dispatch:

# Выдаем права боту на запись в репозиторий (чтобы он мог сохранить sub.txt)
permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем твой репозиторий на виртуальную машину
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.1x'

      # 3. Устанавливаем библиотеку requests
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. Запускаем твой скрипт
      - name: Run scraper
        run: python main.py

      # 5. Сохраняем (коммитим) изменения обратно в GitHub
      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt
          
          # Проверяем, изменился ли файл. Если да — коммитим и пушим.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update V2Ray subscriptions" && git push)
